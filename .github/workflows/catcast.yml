name: Update Catcast Streams

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streams:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Debug catcast-config.json
        run: |
          echo "=== catcast-config.json ==="
          cat catcast-config.json || true
          echo
          echo "=== parsed info ==="
          python - <<'PY'
import json

with open("catcast-config.json", "r", encoding="utf-8") as f:
    data = json.load(f)

print("type:", type(data).__name__)
if isinstance(data, list):
    print("entries:", len(data))
    print("first 5 entries:", data[:5])
else:
    print(data)
PY

      - run: python catcast.py

      - run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add catcast/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Catcast streams"
            git push
          fi
