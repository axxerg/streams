name: Build Catcast Config

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'  # alle 12 Stunden

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run script
        run: |
          python build_catcast_config.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add catcast-config.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update catcast config"
            git push
          fi
