name: Build Catcast Config

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper
        run: python catcast_scraper.py

      - name: Show output
        if: always()
        run: |
          echo "=== catcast-config.json ==="
          cat catcast-config.json || true
          echo "=== catcast-pages-debug.json ==="
          cat catcast-pages-debug.json || true

      - name: Commit and push changes
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add catcast-config.json catcast-pages-debug.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update catcast config from paged online list"
            git push
          fi
