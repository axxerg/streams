name: Update Catcast Streams

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streams:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Show config
        run: |
          echo "=== catcast-config.json ==="
          cat catcast-config.json || echo "file missing"
          echo
          python - <<'PY'
          import json
          try:
              with open("catcast-config.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
              print("type:", type(data).__name__)
              if isinstance(data, list):
                  print("entries:", len(data))
                  print("first_entries:", data[:5])
          except Exception as e:
              print("config debug error:", e)
          PY

      - name: Run script
        run: python catcast.py

      - name: Show git status
        run: |
          git status
          git diff -- catcast || true

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add catcast/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Catcast streams"
            git push
          fi
