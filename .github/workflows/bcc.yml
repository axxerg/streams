name: Build Catcast Config

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Run build script
        run: python catcast_scraper.py

      - name: Show output
        if: always()
        run: |
          echo "=== catcast-config.json ==="
          cat catcast-config.json || echo "No catcast-config.json generated"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add catcast-config.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update catcast config"
            git push
          fi
